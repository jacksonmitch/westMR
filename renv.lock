    "future": {
      "Package": "future",
      "Version": "1.70.0",
      "Source": "Repository",
      "Title": "Unified Parallel and Distributed Processing in R for Everyone",
      "Depends": [
        "R (>= 3.2.0)"
      ],
      "Imports": [
        "digest",
        "globals (>= 0.18.0)",
        "listenv (>= 0.8.0)",
